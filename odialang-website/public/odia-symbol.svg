<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer chakra ring (Konark sun wheel inspired) -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="1.5" class="text-odia-saffron"/>
  
  <!-- Inner chakra ring -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="currentColor" stroke-width="1" opacity="0.6" class="text-odia-indigo"/>
  
  <!-- 12-spoke radial pattern (Konark sun motif) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.5" class="text-odia-saffron">
    <line x1="24" y1="2" x2="24" y2="8"/>
    <line x1="24" y1="40" x2="24" y2="46"/>
    <line x1="2" y1="24" x2="8" y2="24"/>
    <line x1="40" y1="24" x2="46" y2="24"/>
    <line x1="8.86" y1="8.86" x2="13" y2="13"/>
    <line x1="35" y1="35" x2="39.14" y2="39.14"/>
    <line x1="39.14" y1="8.86" x2="35" y2="13"/>
    <line x1="13" y1="35" x2="8.86" y2="39.14"/>
  </g>
  
  <!-- Center hub -->
  <circle cx="24" cy="24" r="6" fill="currentColor" class="text-odia-saffron"/>
  
  <!-- Abstract Odia letterform influence (stylized curves like ଓ) -->
  <path d="M24 14 Q32 18 32 24 Q32 30 24 34 Q18 30 18 24 Q18 18 24 14" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="1.5" 
        stroke-linecap="round"
        class="text-odia-indigo"/>
  
  <!-- Palm leaf stroke accent -->
  <path d="M16 24 Q24 20 32 24" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="0.75" 
        opacity="0.4"
        class="text-odia-saffron"/>
</svg>
