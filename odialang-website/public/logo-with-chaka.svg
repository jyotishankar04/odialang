<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9730f"/>
      <stop offset="50%" style="stop-color:#c9730f"/>
      <stop offset="100%" style="stop-color:#b8630a"/>
    </linearGradient>
  </defs>
  
  <!-- Chaka Akhi Wheel -->
  <g transform="translate(100, 70)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#logo-gradient)" stroke-width="2.5"/>
    
    <!-- Eye-like segments (12 petals) -->
    <g fill="none" stroke="url(#logo-gradient)" stroke-width="1.5" opacity="0.7">
      <!-- Top eye -->
      <ellipse cx="0" cy="-35" rx="10" ry="18" />
      <!-- Top-right eye -->
      <ellipse cx="30.3" cy="-17.5" rx="10" ry="18" transform="rotate(60)"/>
      <!-- Right eye -->
      <ellipse cx="35" cy="0" rx="10" ry="18" transform="rotate(120)"/>
      <!-- Bottom-right eye -->
      <ellipse cx="30.3" cy="17.5" rx="10" ry="18" transform="rotate(180)"/>
      <!-- Bottom eye -->
      <ellipse cx="0" cy="35" rx="10" ry="18" transform="rotate(240)"/>
      <!-- Bottom-left eye -->
      <ellipse cx="-30.3" cy="17.5" rx="10" ry="18" transform="rotate(300)"/>
    </g>
    
    <!-- Inner decorative ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#logo-gradient)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Radiating spokes -->
    <g stroke="url(#logo-gradient)" stroke-width="1" opacity="0.4">
      <line x1="0" y1="-55" x2="0" y2="-45"/>
      <line x1="0" y1="55" x2="0" y2="45"/>
      <line x1="-55" y1="0" x2="-45" y2="0"/>
      <line x1="55" y1="0" x2="45" y2="0"/>
      <line x1="-38.9" y1="-38.9" x2="-31.8" y2="-31.8"/>
      <line x1="38.9" y1="38.9" x2="31.8" y2="31.8"/>
      <line x1="38.9" y1="-38.9" x2="31.8" y2="-31.8"/>
      <line x1="-38.9" y1="38.9" x2="-31.8" y2="31.8"/>
    </g>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="12" fill="url(#logo-gradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="url(#logo-gradient)"/>
  </g>
  
  <!-- Text: Odialang -->
  <text x="100" y="160" 
        text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="28" 
        font-weight="700" 
        fill="url(#logo-gradient)"
        letter-spacing="-0.02em">
    Odialang
  </text>
</svg>
