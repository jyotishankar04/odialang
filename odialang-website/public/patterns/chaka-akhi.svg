<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Chaka Akhi (Wheel of Eyes) - Sacred Pattachitra Motif -->
  <defs>
    <!-- Eye-like segment shape -->
    <path id="eye-segment" d="M50 5 Q65 25 50 45 Q35 25 50 5" />
  </defs>
  
  <!-- Outer thick ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="2" opacity="0.6"/>
  
  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  
  <!-- 12 Eye segments (Chaka Akhi) -->
  <g opacity="0.5">
    <!-- Top -->
    <use href="#eye-segment" transform="rotate(0, 50, 50) translate(0, -5)"/>
    <!-- Top-right -->
    <use href="#eye-segment" transform="rotate(30, 50, 50) translate(0, -5)"/>
    <!-- Right -->
    <use href="#eye-segment" transform="rotate(60, 50, 50) translate(0, -5)"/>
    <!-- Bottom-right -->
    <use href="#eye-segment" transform="rotate(90, 50, 50) translate(0, -5)"/>
    <!-- Bottom -->
    <use href="#eye-segment" transform="rotate(120, 50, 50) translate(0, -5)"/>
    <!-- Bottom-left -->
    <use href="#eye-segment" transform="rotate(150, 50, 50) translate(0, -5)"/>
    <!-- Left -->
    <use href="#eye-segment" transform="rotate(180, 50, 50) translate(0, -5)"/>
    <!-- Top-left -->
    <use href="#eye-segment" transform="rotate(210, 50, 50) translate(0, -5)"/>
    <!-- Upper-left -->
    <use href="#eye-segment" transform="rotate(240, 50, 50) translate(0, -5)"/>
    <!-- Upper-right -->
    <use href="#eye-segment" transform="rotate(270, 50, 50) translate(0, -5)"/>
    <!-- Right-upper -->
    <use href="#eye-segment" transform="rotate(300, 50, 50) translate(0, -5)"/>
    <!-- Left-upper -->
    <use href="#eye-segment" transform="rotate(330, 50, 50) translate(0, -5)"/>
  </g>
  
  <!-- Middle decorative ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Radiating spokes -->
  <g stroke="currentColor" stroke-width="0.75" opacity="0.3">
    <line x1="50" y1="15" x2="50" y2="25"/>
    <line x1="50" y1="75" x2="50" y2="85"/>
    <line x1="15" y1="50" x2="25" y2="50"/>
    <line x1="75" y1="50" x2="85" y2="50"/>
    <line x1="25.25" y1="25.25" x2="32" y2="32"/>
    <line x1="68" y1="68" x2="74.75" y2="74.75"/>
    <line x1="74.75" y1="25.25" x2="68" y2="32"/>
    <line x1="32" y1="68" x2="25.25" y2="74.75"/>
  </g>
  
  <!-- Inner decorative ring -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  
  <!-- Center hub -->
  <circle cx="50" cy="50" r="8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="4" fill="currentColor" opacity="0.8"/>
</svg>
