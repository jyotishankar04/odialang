<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Palm leaf manuscript stroke pattern -->
  <defs>
    <pattern id="palm-unit" x="0" y="0" width="40" height="30" patternUnits="userSpaceOnUse">
      <!-- Curved palm-leaf inspired strokes -->
      <path d="M5 25 Q20 10 35 25" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="1" 
            opacity="0.4"
            stroke-linecap="round"/>
      <path d="M5 20 Q20 5 35 20" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="0.75" 
            opacity="0.3"
            stroke-linecap="round"/>
      <!-- Manuscript-style dots -->
      <circle cx="10" cy="28" r="1" fill="currentColor" opacity="0.25"/>
      <circle cx="20" cy="25" r="1" fill="currentColor" opacity="0.25"/>
      <circle cx="30" cy="28" r="1" fill="currentColor" opacity="0.25"/>
      <!-- Vertical stroke accents -->
      <line x1="20" y1="15" x2="20" y2="22" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="80" height="60" fill="url(#palm-unit)"/>
</svg>
