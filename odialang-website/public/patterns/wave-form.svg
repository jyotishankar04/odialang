<svg viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Soft coastal wave form pattern -->
  <defs>
    <pattern id="wave-unit" x="0" y="0" width="100" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 15 Q25 5 50 15 T100 15" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="1.5" 
            opacity="0.5"/>
      <path d="M0 22 Q25 12 50 22 T100 22" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="1" 
            opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100" height="30" fill="url(#wave-unit)"/>
</svg>
