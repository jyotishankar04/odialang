<svg viewBox="0 0 120 12" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <!-- Pattachitra-style repeating border pattern -->
  <defs>
    <pattern id="pattachitra-unit" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.6"/>
      <circle cx="6" cy="6" r="2" fill="currentColor" opacity="0.4"/>
      <line x1="0" y1="6" x2="2" y2="6" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <line x1="10" y1="6" x2="12" y2="6" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="120" height="12" fill="url(#pattachitra-unit)" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
</svg>
